model:
  base_model: Qwen/Qwen2.5-7B-Instruct
  lora_adapter_dir: model_full/lora_adapter
data:
  test_path: sft/multilingual/test.jsonl
evaluation:
  num_samples_per_lang: 50
  langs: [bn, ar, es]
  check_language_with: langdetect
  compute_bleu: true
  run_baseline: true
  max_new_tokens: 128
outputs:
  report_path: eval_report_full.md
