# Zero-shot vs Fine-tuned evaluation on teacher-labeled test set.
# Dialogue-based: test set consists of 200 held-out dialogues (one SFT row per dialogue).

model:
  base_model: Qwen/Qwen2.5-0.5B-Instruct
  lora_adapter_dir: model_teacher_dialogue_1000/lora_adapter

data:
  test_path: sft/teacher_dialogue_1000_bn/test.jsonl

evaluation:
  # This is how many SFT rows to sample for metric computation.
  num_samples_per_lang: 200
  langs: [bn]
  compute_bleu: true
  run_baseline: true
  max_new_tokens: 96

outputs:
  report_path: eval_report_teacher_dialogue_1000.md
  include_samples: true
  num_samples_per_lang: 5
  samples_format: blocks
