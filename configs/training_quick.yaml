# Quick run: smaller model + few steps (for pipeline completion without GPU)
base_model: Qwen/Qwen2.5-0.5B-Instruct
data:
  train_path: sft/multilingual/train.jsonl
  eval_path: sft/multilingual/validation.jsonl
training:
  seed: 42
  max_seq_len: 1024
  num_train_epochs: 1
  max_steps: 20
  learning_rate: 2.0e-4
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  warmup_ratio: 0.03
  logging_steps: 2
  save_steps: 10
  output_dir: model
lora:
  enabled: true
  r: 8
  alpha: 16
  dropout: 0.05
precision:
  bf16: auto
  fp16: auto
