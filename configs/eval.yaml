# Paths resolved under DATA_DIR, OUTPUTS_DIR, REPORTS_DIR via env
model:
  base_model: Qwen/Qwen2.5-7B-Instruct
  lora_adapter_dir: model/lora_adapter
data:
  test_path: sft/multilingual/test.jsonl
evaluation:
  num_samples_per_lang: 100
  langs: [bn, ar, es]
  check_language_with: langdetect
  compute_bleu: true
  run_baseline: true   # compare Zero-shot (base) vs Fine-tuned (LoRA)
  max_new_tokens: 128
outputs:
  report_path: eval_report.md
