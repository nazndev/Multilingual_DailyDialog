# Train on the 1000-dialogue manual-translation dataset (SFT format).
# Note: This is a heavier run than the 100 demo; consider GPU/Colab.

base_model: Qwen/Qwen2.5-0.5B-Instruct

data:
  train_path: sft/multilingual_1000/train.jsonl
  # Use validation for in-training evaluation; keep test for final eval.
  eval_path: sft/multilingual_1000/validation.jsonl

training:
  seed: 42
  max_seq_len: 512
  num_train_epochs: 1
  # Adjust as needed based on compute; keeping finite steps helps demos.
  max_steps: 50
  learning_rate: 2.0e-4
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 2
  warmup_ratio: 0.03
  logging_steps: 1
  save_steps: 25
  output_dir: model_1000

lora:
  enabled: true
  r: 8
  alpha: 16
  dropout: 0.05

precision:
  bf16: auto
  fp16: auto
