# Train (1k subset): points to sft/multilingual_1k produced by translation_1k.yaml
# Uses small model by default for fast iteration.
base_model: Qwen/Qwen2.5-0.5B-Instruct

data:
  train_path: sft/multilingual_1k/train.jsonl
  eval_path: sft/multilingual_1k/validation.jsonl

training:
  seed: 42
  max_seq_len: 1024
  num_train_epochs: 1
  # Keep steps small; dataset size is smaller but steps control runtime
  max_steps: 50
  learning_rate: 2.0e-4
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  warmup_ratio: 0.03
  logging_steps: 5
  save_steps: 25
  output_dir: model_1k

lora:
  enabled: true
  r: 8
  alpha: 16
  dropout: 0.05

precision:
  bf16: auto
  fp16: auto
