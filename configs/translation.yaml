# Translation: all dialogues, bn/ar/es. Backend: local = NLLB; for GPT set TRANSLATION_BACKEND=api and OPENAI_API_KEY.
backend: local
local:
  model_name: facebook/nllb-200-distilled-600M
  device: auto
  batch_size: 16
  max_new_tokens: 256
api:
  provider: openai
  model: gpt-4o-mini
  max_tokens: 256
  max_retries: 3
  sleep_between_retries_sec: 1

targets: [bn, ar, es]
max_dialogues_per_split: null

processed_dir: processed
out_dir: translated_dailydialog_en_bn_ar_es
cache:
  enabled: true
  dir: cache/translations
quality:
  length_ratio_min: 0.4
  length_ratio_max: 3.0
  max_chars_per_turn: 800
