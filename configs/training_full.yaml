base_model: Qwen/Qwen2.5-7B-Instruct
data:
  train_path: sft/multilingual/train.jsonl
  eval_path: sft/multilingual/validation.jsonl
training:
  seed: 42
  max_seq_len: 2048
  num_train_epochs: 1
  max_steps: 500
  learning_rate: 2.0e-4
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  warmup_ratio: 0.03
  logging_steps: 25
  save_steps: 200
  output_dir: model_full
lora:
  enabled: true
  r: 16
  alpha: 32
  dropout: 0.05
precision:
  bf16: auto
  fp16: auto
