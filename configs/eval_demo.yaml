# Evaluation config for demo training runs (training_demo.yaml).

model:
  base_model: Qwen/Qwen2.5-0.5B-Instruct
  load_in_4bit: false
  load_in_8bit: false
  torch_dtype: null
  device_map: null
  lora_adapter_dir: model_demo/lora_adapter

data:
  test_path: sft/multilingual_1000/test.jsonl

evaluation:
  num_samples_per_lang: 200
  langs: [bn]
  compute_bleu: true
  compute_chrf: true
  compute_bertscore: false
  run_baseline: true
  max_new_tokens: 96
  generation:
    max_new_tokens: 96
    do_sample: false
    temperature: 1.0
    top_p: 1.0
    num_beams: 1
    repetition_penalty: 1.0
    eos_token_id_mode: auto
  prompt:
    style: default
    short_reply_hint: false
    use_emotion_tag: false
    use_dialog_act_tag: false
    system_template: null

outputs:
  report_path: eval_report_demo.md
  metrics_path: eval_metrics_demo.json
  predictions_path: generations_demo.jsonl
  include_samples: true
  num_samples_per_lang: 5
  samples_format: blocks
