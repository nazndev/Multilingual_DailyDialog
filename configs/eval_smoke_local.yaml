# Local smoke test: tiny Bengali split + small 0.5B model, few tokens.
# No LoRA adapter — zero-shot only (fine-tuned columns stay empty).
# Usage from repo root:
#   export DATA_DIR=./data OUTPUTS_DIR=./outputs REPORTS_DIR=./reports
#   python src/07_eval.py --config configs/eval_smoke_local.yaml

model:
  base_model: Qwen/Qwen2.5-0.5B-Instruct
  load_in_4bit: false
  load_in_8bit: false
  torch_dtype: null
  device_map: null

data:
  test_path: sft/smoke/test.jsonl

evaluation:
  run_baseline: true
  bleu_tokenizer: flores200
  compute_bleu: true
  compute_chrf: true
  compute_bertscore: false
  num_samples_per_lang: 4
  langs: [bn]
  max_new_tokens: 48
  generation:
    max_new_tokens: 48
    do_sample: false
    temperature: 1.0
    top_p: 1.0
    num_beams: 1
    repetition_penalty: 1.0
    eos_token_id_mode: auto
  prompt:
    style: default
    short_reply_hint: true
    use_emotion_tag: false
    use_dialog_act_tag: false
    system_template: null

outputs:
  report_path: eval_report_smoke_local.md
  metrics_path: eval_metrics_smoke_local.json
  predictions_path: generations_smoke_local.jsonl
  include_samples: true
  num_samples_per_lang: 2
  samples_format: blocks
