# Train Qwen 0.5B on teacher-labeled Bangla SFT examples (800 train / 200 test).
# Teacher outputs are generated by Qwen 7B and stored in data/sft/teacher_1000_bn/.

base_model: Qwen/Qwen2.5-0.5B-Instruct

data:
  train_path: sft/teacher_1000_bn/train.jsonl
  eval_path: sft/teacher_1000_bn/test.jsonl

training:
  seed: 42
  max_seq_len: 512
  num_train_epochs: 1
  max_steps: 100
  learning_rate: 2.0e-4
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 2
  warmup_ratio: 0.03
  logging_steps: 1
  save_steps: 50
  output_dir: model_teacher_1000

lora:
  enabled: true
  r: 8
  alpha: 16
  dropout: 0.05

precision:
  bf16: auto
  fp16: auto
